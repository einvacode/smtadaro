<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to MarineCCTV Dashboard - Secure access to maritime CCTV monitoring system">
  <title>Login | MarineCCTV Monitoring System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060a16; --bg2: #0c1225; --bg3: #111827;
      --cyan: #00d4ff; --green: #00ff88; --blue: #0099ff; --red: #ff4757;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
      --border: rgba(255,255,255,0.06);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ===== Background ===== */
    .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-canvas .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .bg-canvas .glow-1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(0,153,255,0.1), transparent 70%); top: -200px; right: -100px; animation: gfloat 20s ease-in-out infinite; }
    .bg-canvas .glow-2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,136,0.06), transparent 70%); bottom: -150px; left: -80px; animation: gfloat 25s ease-in-out infinite reverse; }
    @keyframes gfloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, 20px); } }

    /* ===== Scan Lines (subtle CRT effect) ===== */
    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    /* ===== Login Container ===== */
    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px; padding: 20px;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== Logo ===== */
    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo a { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; }
    .login-logo svg { width: 44px; height: 44px; }
    .login-logo-text { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ===== Card ===== */
    .login-card {
      background: rgba(12,18,37,0.8);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 80px rgba(0,153,255,0.05);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--green), transparent);
    }

    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .login-header p { color: var(--text3); font-size: 0.88rem; }

    /* ===== Form ===== */
    .form-group { margin-bottom: 20px; position: relative; }
    .form-group label { display: block; margin-bottom: 7px; font-size: 0.82rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrapper { position: relative; }
    .input-wrapper svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; stroke: var(--text3);
      pointer-events: none; transition: stroke 0.2s;
    }
    .form-group input {
      width: 100%; padding: 13px 16px 13px 44px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 0.95rem;
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus { border-color: var(--cyan); background: rgba(0,212,255,0.03); box-shadow: 0 0 0 3px rgba(0,212,255,0.08); }
    .form-group input:focus + svg,
    .form-group input:focus ~ svg { stroke: var(--cyan); }
    .form-group input::placeholder { color: var(--text3); }

    /* Toggle password */
    .toggle-password {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text3); cursor: pointer;
      padding: 4px; transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--text); }
    .toggle-password svg { width: 18px; height: 18px; }

    /* ===== Error Message ===== */
    .login-error {
      display: none; padding: 12px 16px; border-radius: 10px;
      background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.2);
      color: var(--red); font-size: 0.85rem; margin-bottom: 20px;
      text-align: center; font-weight: 500;
      animation: shake 0.4s ease;
    }
    .login-error.show { display: block; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }

    /* ===== Button ===== */
    .btn-submit {
      width: 100%; padding: 14px; border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: #fff; font-weight: 700; font-size: 1rem;
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,153,255,0.3);
      transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: 'Inter', sans-serif;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0,153,255,0.45); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-submit .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Footer Link ===== */
    .login-footer {
      text-align: center; margin-top: 24px;
      color: var(--text3); font-size: 0.82rem;
    }
    .login-footer a { color: var(--cyan); font-weight: 500; transition: color 0.2s; }
    .login-footer a:hover { color: var(--text); text-decoration: underline; }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; border-radius: 16px; }
      .login-header h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="bg-canvas">
    <div class="grid-overlay"></div>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>
  <div class="scanlines"></div>

  <div class="login-container">
    <!-- Logo -->
    <div class="login-logo">
      <a href="/">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#lg2)" stroke-width="2.5"/>
          <circle cx="20" cy="20" r="8" fill="url(#lg2)"/>
          <circle cx="20" cy="20" r="4" fill="#060a16"/>
          <line x1="20" y1="2" x2="20" y2="8" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
          <line x1="38" y1="20" x2="32" y2="20" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="38" x2="20" y2="32" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
          <line x1="2" y1="20" x2="8" y2="20" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
          <defs><linearGradient id="lg2" x1="0" y1="0" x2="40" y2="40"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#0099ff"/></linearGradient></defs>
        </svg>
        <span class="login-logo-text">MarineCCTV</span>
      </a>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <div class="login-header">
        <h2>Login Portal</h2>
        <p>Masukkan kredensial untuk akses dashboard</p>
      </div>

      <!-- Error -->
      <div class="login-error" id="loginError"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username" autofocus>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <button type="button" class="toggle-password" onclick="togglePassword()" id="togglePwdBtn" title="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">
          <span class="btn-text">Masuk ke Dashboard</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/">← Kembali ke Halaman Utama</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/dashboard';
    }).catch(() => {});

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // Load dynamic settings
    (async function loadBranding() {
      try {
        const res = await fetch('/api/public/settings');
        if (!res.ok) return;
        const s = await res.json();

        // App name
        if (s.app_name) {
          document.querySelectorAll('.login-logo-text').forEach(el => el.textContent = s.app_name);
        }

        // Logo
        if (s.logo_path) {
          document.querySelectorAll('.login-logo svg').forEach(svg => {
            const img = document.createElement('img');
            img.src = s.logo_path;
            img.alt = s.app_name || 'Logo';
            img.style.cssText = 'width:44px;height:44px;object-fit:contain;border-radius:8px;';
            svg.parentNode.replaceChild(img, svg);
          });
        }
      } catch (e) {}
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      const errorEl = document.getElementById('loginError');
      errorEl.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorEl.textContent = 'Username dan password wajib diisi';
        errorEl.classList.add('show');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Success — redirect to dashboard
        window.location.href = '/dashboard';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>
